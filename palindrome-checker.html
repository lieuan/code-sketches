        // checkTheText

        function checkPalindrome(str) {
          console.log("palindrome check: " + str);

str= str.replaceAll(" ", "");

            let theLetters = str.split("");
            let verlan = theLetters.reverse();
            let rts = verlan.join("");

                return true;
            } else {
                return false;
            }
        }
